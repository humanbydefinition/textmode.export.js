name: Discussion
description: Start a broader discussion about the textmode.export.js library.
title: "[Discussion]: "
labels: [Discussion]
body:
  - type: textarea
    id: topic
    attributes:
      label: Topic or decision to discuss
      description: What API direction, export behavior, overlay workflow, packaging decision, or docs strategy do you want to discuss?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include examples, prior discussion, browser constraints, compatibility concerns, or specific tradeoffs that would make the discussion actionable.
    validations:
      required: false
