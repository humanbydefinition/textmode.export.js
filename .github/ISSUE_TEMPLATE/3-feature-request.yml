name: New Feature Request
description: Request a new capability for textmode.export.js.
title: '[Feature]: '
labels: [Feature Request]
body:
    - type: markdown
      attributes:
          value: |
              Use this form for new export capabilities in the `textmode.export.js` library itself.

              This is the right place for new export formats, overlay workflows, library APIs, clipboard/download helpers, or contributor tooling specific to export behavior. It is not the right place for core `textmode.js` engine or editor requests.
    - type: checkboxes
      id: checks
      attributes:
          label: Pre-flight checks
          options:
              - label: I searched existing issues and did not find an obvious duplicate.
                required: true
              - label: This request is specific to textmode.export.js rather than the core textmode.js project.
                required: true
    - type: checkboxes
      id: area
      attributes:
          label: Most relevant area
          description: You may select more than one.
          options:
              - label: New export format
              - label: New export API
              - label: Export overlay UI / workflow
              - label: Clipboard / download / browser permissions
              - label: Batch export / automation / recording workflow
              - label: textmode.js integration
              - label: Build / types / packaging
              - label: Documentation / examples
              - label: Contributor tooling / testing
              - label: Other
    - type: textarea
      id: problem
      attributes:
          label: Problem to solve
          description: What are you unable to do today with the current library?
      validations:
          required: true
    - type: textarea
      id: proposal
      attributes:
          label: Proposed feature or API shape
          description: Describe the new export format, method signature, overlay flow, configuration option, or tooling you want.
      validations:
          required: true
    - type: textarea
      id: use-case
      attributes:
          label: Example sketch or target workflow
          description: Show the kind of code or workflow you want, even if the API is only approximate.
          value: |
              ```js
              // Example:
              // await t.saveCanvas({ format: 'png', scale: 2, filename: 'poster' });
              // await t.saveGIF({ frameCount: 120, frameRate: 30 });
              ```
      validations:
          required: true
    - type: textarea
      id: examples
      attributes:
          label: Prior art, constraints, or implementation notes
          description: Similar APIs in creative-coding libraries, browser export tools, recording workflows, or anything about compatibility, performance, and edge cases.
      validations:
          required: false
