<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>textmode.export.js - sketch</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<script type="module">
			import * as textmodeModule from 'textmode.js';
			import * as exportModule from 'textmode.export.js';

			const params = new URLSearchParams(window.location.search);
			const rawPath = params.get('path');
			const group = params.get('group');
			const entry = params.get('entry');
			const isEmbeddedPreview = window.self !== window.top;
			const validSegment = /^[A-Za-z0-9_.-]+$/;
			const MANIFEST_URL = './manifest.json';

			function resolveExamplePath() {
				if (rawPath) {
					return rawPath;
				}

				if (group && entry) {
					return `${group}/${entry}`;
				}

				return null;
			}

			function isValidPath(path) {
				const segments = path.split('/');
				return (
					segments.length > 0 &&
					segments.every(
						(segment) =>
							segment.length > 0 && segment !== '.' && segment !== '..' && validSegment.test(segment)
					)
				);
			}

			function showError(message) {
				document.body.innerHTML = `
					<div class="sketch-error">
						<div class="sketch-error-card">
							<p>${message}</p>
						</div>
					</div>
				`;
			}

			function getExamplePath(sourceFile) {
				if (!sourceFile.startsWith('examples/') || !sourceFile.endsWith('/sketch.js')) {
					return null;
				}

				return sourceFile.slice('examples/'.length, -'/sketch.js'.length);
			}

			function findExample(manifest, examplePath) {
				for (const manifestGroup of manifest.groups || []) {
					for (const manifestExample of manifestGroup.examples || []) {
						if (getExamplePath(manifestExample.sourceFile) === examplePath) {
							return {
								title: manifestExample.title,
								subtitle: manifestExample.description || manifestGroup.description || '',
							};
						}
					}
				}

				return null;
			}

			async function loadManifest() {
				const response = await fetch(MANIFEST_URL);

				if (!response.ok) {
					throw new Error(`Unable to load examples manifest (${response.status}).`);
				}

				return response.json();
			}

			async function bootstrapSketch() {
				const examplePath = resolveExamplePath();

				if (!examplePath || !isValidPath(examplePath)) {
					showError('Invalid example path.');
					return;
				}

				let example;

				try {
					example = findExample(await loadManifest(), examplePath);
				} catch (error) {
					console.error(error);
					showError('Unable to load examples manifest.');
					return;
				}

				if (!example) {
					showError('Invalid example path.');
					return;
				}

				document.title = `textmode.export.js - ${example.title}`;

				document.body.innerHTML = `
					${
						isEmbeddedPreview
							? ''
							: `
					<div class="nav-overlay">
						<a href="./index.html" class="back-link">back to examples</a>
					</div>
					`
					}
					<div class="sketch-shell${isEmbeddedPreview ? ' is-embedded' : ''}">
						<div class="sketch-layout sketch-layout--single">
							<section class="canvas-panel">
								<div class="canvas-panel-header">
									<h1 class="canvas-panel-title">${example.title}</h1>
									<p class="canvas-panel-subtitle">${example.subtitle}</p>
								</div>
								<div class="canvas-frame">
									<canvas id="textmode-canvas" width="800" height="600"></canvas>
								</div>
							</section>
						</div>
					</div>
				`;

				window.textmode = textmodeModule.textmode;
				window.TextmodeErrorLevel = textmodeModule.TextmodeErrorLevel;
				window.ExportPlugin = exportModule.ExportPlugin;
				window.createTextmodeExportPlugin = exportModule.createTextmodeExportPlugin;

				const script = document.createElement('script');
				script.src = `./${examplePath}/sketch.js`;
				script.onerror = () => showError(`Unable to load ${examplePath}.`);
				document.body.appendChild(script);
			}

			bootstrapSketch();
		</script>
	</body>
</html>
